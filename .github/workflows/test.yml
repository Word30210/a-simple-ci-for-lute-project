name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lute-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          log_level: debug
          mise_toml: |
            [tools]
            "github:luau-lang/lute" = "latest"
      - run: lute --version