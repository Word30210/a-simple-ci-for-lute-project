name = "word30210/github_action_test"
version = "0.1.0"
authors = ["word30210"]
license = "MIT"
includes = [
    "README.md",
    "src/**",
    "pesde.toml"
]

[target]
environment = "luau"
lib = "src/lib.luau"

[dependencies]
luau_result = { name = "word30210/luau_result", version = "^0.1.3" }

[dev_dependencies]
darklua = { name = "pesde/darklua", version = "^0.18.0", target = "lune" }
multitarget = { name = "ewdev/multitarget", version = "^0.4.2-rc.7", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.7.0-rc.1", target = "lune" }

[indices]
default = "https://github.com/pesde-pkg/index"